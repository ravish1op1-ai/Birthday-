<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top,#ff9a9e,#fad0c4,#a18cd1);
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  padding:20px;
  border-radius:25px;
  width:92%;
  max-width:520px;
  text-align:center;
  max-height:90vh;
  overflow:auto;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#ff4081,#ff9800);
  color:white;
  cursor:pointer;
}

/* PAGES */
.page{display:none; opacity:0; transition:0.5s;}
.page.active{display:block; opacity:1;}

canvas{
  position:absolute;
  top:0;left:0;
}

/* BALLOONS */
.balloon{
  position:absolute;
  width:25px;
  height:35px;
  border-radius:50%;
  animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120vh);}
}

/* 🔐 PREMIUM LOCK SCREEN */
#lockScreen{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: linear-gradient(135deg,#1e1e2f,#3a3a6a,#6a4ca3);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  color:white;
}

.lockBox{
  background: rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(12px);
  text-align:center;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  width:200px;
}

/* CAKE */
#cakeBox{
  font-size:80px;
  cursor:pointer;
  transition:0.3s;
}

#cakeBox.cut{
  transform:scale(1.2) rotate(-10deg);
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lockBox">
    <h2>🔒 Enter Password</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="checkPass()">Unlock</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="song" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1f2c.mp3">
</audio>

<canvas id="fireworks"></canvas>

<div class="card">

<div class="page active" id="p1">
<h1>🎉 Happy Birthday 🎂</h1>
<p id="text1"></p>
<button onclick="next(1)">Next ➡</button>
</div>

<div class="page" id="p2">
<p id="text2"></p>
<button onclick="next(2)">Next ➡</button>
</div>

<div class="page" id="p3">
<p id="text3"></p>
<button onclick="next(3)">Next ➡</button>
</div>

<div class="page" id="p4">
<p id="text4"></p>
<button onclick="next(4)">Next ➡</button>
</div>

<div class="page" id="p5">
<h1>🎂 Happy Birthday 🎂</h1>

<div id="cakeBox" onclick="cutCake()">
🎂
<p style="font-size:12px;">Tap to cut cake ✂️</p>
</div>

<p id="text5"></p>
</div>

</div>

<script>

// PASSWORD
function checkPass(){
  let p=document.getElementById('pass').value;
  if(p==='6/4/26'){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('song').play();
    typeText('text1', messages[0]);
  }else{
    alert('Wrong Password!');
  }
}

// ✅ YOUR EXACT MESSAGES
const messages = [

`Happy Birthday 🎂✨
Aaj ka din aapke liye bahut special hai, aur main bas itna chahta hoon ki aap hamesha khush rahein.
Aapki smile aise hi bani rahe… aur aapko life me har wo cheez mile jo aap deserve karti hain 😊`,

`Ek baat sach bolu… maine aapko school me dekha tha, par kabhi socha nahi tha ki kabhi aapse baat bhi hogi.
Lekin jab baat hui, to aapka baat karne ka tarika kaafi achha laga… simple aur genuine 😊`,

`Aur haan… main aapko ‘bhagwaan ji’ mazak me nahi bolta 😅
Bas aap achhi lagti hain…
isliye kabhi-kabhi dil se nikal jata hai 😊
Aur honestly…
agar aap aise hi meri life me bani rahein na,
to wo mere liye kaafi special hoga 💖`,

`Jab bhi main aapse baat karta hoon…
pata nahi kyu, par mood automatically achha ho jata hai 😊
Shayad aapki baaton me hi kuch alag hai…
Aur seriously, thank you…
itna simple sa khush kar dene ke liye 💫`,

`Main bas itna chahta hoon ki aap hamesha khush rahein
aur life me bahut aage badhein 😊
Aur haan…
agar kabhi meri kisi baat se aapko bura laga ho,
to sorry… mera intention kabhi galat nahi tha 💖

Once again…
Happy Birthday 🎉✨`
];

// TYPE EFFECT
function typeText(id, text){
  let i=0;
  document.getElementById(id).innerHTML="";
  function typing(){
    if(i<text.length){
      document.getElementById(id).innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,25);
    }
  }
  typing();
}

// NEXT
function next(n){
  document.getElementById('p'+n).classList.remove('active');
  document.getElementById('p'+(n+1)).classList.add('active');
  typeText('text'+(n+1), messages[n]);

  if(n===4){
    startBalloons();
    startFireworks();
  }
}

// CAKE
function cutCake(){
  let cake=document.getElementById('cakeBox');
  cake.classList.add('cut');
  cake.innerHTML="🍰";

  startBalloons();
  startFireworks();

  document.getElementById('text5').innerHTML += "<br><br>🎉 Cake cut ho gaya! Enjoy your day ✨";
}

// BALLOONS
function startBalloons(){
  for(let i=0;i<20;i++){
    let b=document.createElement('div');
    b.className='balloon';
    b.style.left=Math.random()*100+'vw';
    b.style.background=['red','blue','green','yellow','purple'][Math.floor(Math.random()*5)];
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
  }
}

// FIREWORKS
const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
let fireStarted=false;

function createFirework(){
  let x=Math.random()*canvas.width;
  let y=Math.random()*canvas.height/2;

  for(let i=0;i<60;i++){
    let angle=Math.random()*Math.PI*2;
    let speed=Math.random()*6;
    particles.push({
      x:x,y:y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      alpha:1
    });
  }
}

function animate(){
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.vy+=0.05;
    p.x+=p.vx;
    p.y+=p.vy;
    p.alpha-=0.01;

    ctx.fillStyle='rgba(255,255,255,'+p.alpha+')';
    ctx.fillRect(p.x,p.y,2,2);

    if(p.alpha<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}

function startFireworks(){
  if(fireStarted) return;
  fireStarted=true;

  setInterval(createFirework,800);
  animate();
}

</script>

</body>
</html>
